<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>New Record — MyApp</title>
  <link th:href="@{/css/base.css}" rel="stylesheet"/>
  <style>
    body { display:flex; min-height:100vh; }
    .sidebar {
      width:var(--sw); flex-shrink:0;
      background:rgba(11 9 26/.95); backdrop-filter:blur(20px);
      border-right:1px solid var(--rim);
      position:fixed; inset-block:0; left:0; z-index:200;
      display:flex; flex-direction:column; transition:transform .3s;
    }
    .sb-brand { padding:28px 24px 22px; border-bottom:1px solid var(--rim2); display:flex; align-items:center; gap:12px; }
    .brand-mark {
      width:40px; height:40px; border-radius:12px; flex-shrink:0;
      background:linear-gradient(135deg,#00f5c8,#6366f1);
      display:flex; align-items:center; justify-content:center;
      font-family:'Instrument Serif',serif; font-size:21px; color:#fff;
      box-shadow:0 0 0 1px rgba(0 245 200/.25),0 6px 24px rgba(0 245 200/.2);
    }
    .brand-info .name { font-family:'Instrument Serif',serif; font-size:20px; background:linear-gradient(90deg,#00f5c8,#a5b4fc); background-size:200%; animation:shimmer 5s linear infinite; -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .brand-info .by   { font-size:10.5px; color:rgba(255 255 255/.25); letter-spacing:.04em; margin-top:1px; }
    .sb-body { flex:1; padding:16px 14px; overflow-y:auto; display:flex; flex-direction:column; gap:2px; }
    .nav-label { font-size:10px; text-transform:uppercase; letter-spacing:.13em; color:rgba(255 255 255/.2); padding:14px 10px 6px; }
    .nav-link { display:flex; align-items:center; gap:11px; padding:10px 12px; border-radius:11px; color:rgba(255 255 255/.42); text-decoration:none; font-size:14px; font-weight:500; transition:all .18s; position:relative; overflow:hidden; }
    .nav-link:hover { background:rgba(255 255 255/.06); color:var(--snow); }
    .nav-link.active { background:linear-gradient(135deg,rgba(99 102 241/.22),rgba(0 245 200/.08)); color:var(--teal); border:1px solid rgba(0 245 200/.18); }
    .nav-link.active::before { content:''; position:absolute; left:0; top:20%; bottom:20%; width:2px; background:var(--teal); border-radius:0 2px 2px 0; }
    .nav-ic { font-size:18px; width:24px; text-align:center; flex-shrink:0; }
    .sb-foot { padding:14px; border-top:1px solid var(--rim2); }
    .user-card { background:rgba(255 255 255/.04); border:1px solid var(--rim); border-radius:13px; padding:12px 14px; display:flex; align-items:center; gap:10px; }
    .u-av { width:36px; height:36px; border-radius:50%; flex-shrink:0; background:linear-gradient(135deg,#6366f1,#f43f8e); display:flex; align-items:center; justify-content:center; font-family:'Instrument Serif',serif; font-size:17px; color:#fff; }
    .u-name { font-size:13px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .u-role { font-size:10.5px; color:var(--fog); }
    .logout-btn { background:rgba(244 63 142/.1); border:1px solid rgba(244 63 142/.2); border-radius:8px; padding:6px 10px; color:#fb7db4; font-family:'Geist',sans-serif; font-size:12px; font-weight:600; cursor:pointer; transition:background .15s; }
    .logout-btn:hover { background:rgba(244 63 142/.2); }
    .main { margin-left:var(--sw); flex:1; padding:36px 40px; min-width:0; }
    .breadcrumb { display:flex; align-items:center; gap:8px; font-size:13px; color:var(--fog); margin-bottom:14px; }
    .breadcrumb a { color:var(--teal); text-decoration:none; }
    .breadcrumb a:hover { text-decoration:underline; }
    .page-header { margin-bottom:20px; }
    .page-header h1 { font-family:'Instrument Serif',serif; font-size:28px; font-weight:400; margin-bottom:6px; }
    .page-header p  { font-size:13.5px; color:var(--fog); }
    .creating-as { display:inline-flex; align-items:center; gap:8px; background:rgba(99 102 241/.1); border:1px solid rgba(99 102 241/.22); border-radius:99px; padding:7px 16px; font-size:13px; color:#a5b4fc; margin-bottom:28px; }
    .creating-as strong { color:var(--snow); font-weight:700; }
    .alert { display:flex; align-items:center; gap:10px; padding:13px 18px; border-radius:12px; font-size:13px; margin-bottom:24px; border:1px solid; }
    .as { background:rgba(16 185 129/.08); border-color:rgba(16 185 129/.25); color:#6ee7b7; }
    .ae { background:rgba(244 63 142/.08); border-color:rgba(244 63 142/.25); color:#fb7db4; }
    .form-card { background:var(--glass); border:1px solid var(--rim); border-radius:24px; padding:40px; max-width:740px; position:relative; overflow:hidden; }
    .form-card::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg,#6366f1,#00f5c8,#f43f8e); }
    .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:22px; }
    .form-group { display:flex; flex-direction:column; gap:8px; }
    .form-group.full { grid-column:1/-1; }
    label.lbl { font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:.08em; color:var(--fog); }
    label.lbl .req { color:#f43f8e; margin-left:3px; }
    input[type=text], textarea, select { background:rgba(255 255 255/.05); border:1px solid var(--rim); border-radius:12px; padding:13px 16px; color:var(--snow); font-family:'Geist',sans-serif; font-size:14px; outline:none; transition:border-color .2s, box-shadow .2s; width:100%; box-sizing:border-box; }
    input:focus, textarea:focus, select:focus { border-color:rgba(0 245 200/.5); box-shadow:0 0 0 3px rgba(0 245 200/.08); }
    input::placeholder, textarea::placeholder { color:rgba(255 255 255/.2); }
    textarea { resize:vertical; min-height:130px; }
    select option { background:#1a1730; color:var(--snow); }
    .status-group { display:flex; gap:10px; flex-wrap:wrap; }
    .status-opt { display:none; }
    .status-lbl { display:inline-flex; align-items:center; gap:6px; padding:9px 20px; border-radius:99px; cursor:pointer; font-size:13px; font-weight:600; border:1px solid var(--rim); color:var(--fog); transition:all .18s; user-select:none; }
    .status-lbl::before { content:''; width:7px; height:7px; border-radius:50%; background:currentColor; opacity:.4; }
    #s-active:checked  + .status-lbl { background:rgba(16 185 129/.18); color:#6ee7b7; border-color:rgba(16 185 129/.35); }
    #s-pending:checked + .status-lbl { background:rgba(245 166 35/.18); color:#fde68a; border-color:rgba(245 166 35/.35); }
    #s-closed:checked  + .status-lbl { background:rgba(255 255 255/.08); color:var(--snow); border-color:rgba(255 255 255/.2); }
    .char-count { font-size:11px; color:var(--fog); text-align:right; }
    .form-actions { display:flex; align-items:center; gap:12px; margin-top:32px; padding-top:24px; border-top:1px solid var(--rim2); }
    .btn-submit { display:inline-flex; align-items:center; gap:8px; background:linear-gradient(135deg,#6366f1,#0ea5e9); border:none; border-radius:12px; padding:13px 28px; color:#fff; font-family:'Geist',sans-serif; font-size:14px; font-weight:700; cursor:pointer; position:relative; overflow:hidden; transition:transform .15s, box-shadow .2s; box-shadow:0 4px 22px rgba(99 102 241/.4); }
    .btn-submit::before { content:''; position:absolute; inset:0; background:linear-gradient(180deg,rgba(255 255 255/.15),transparent); }
    .btn-submit:hover { transform:translateY(-2px); box-shadow:0 8px 36px rgba(99 102 241/.55); }
    .btn-cancel { background:rgba(255 255 255/.05); border:1px solid var(--rim); border-radius:12px; padding:13px 24px; color:var(--fog); font-family:'Geist',sans-serif; font-size:14px; font-weight:600; cursor:pointer; text-decoration:none; transition:border-color .15s, color .15s; }
    .btn-cancel:hover { border-color:rgba(255 255 255/.25); color:var(--snow); }
    @media(max-width:768px) { .sidebar{transform:translateX(-100%);} .main{margin-left:0;padding:24px 18px;} .form-grid{grid-template-columns:1fr;} }
  </style>
</head>
<body>

<aside class="sidebar">
  <div class="sb-brand">
    <div class="brand-mark">M</div>
    <div class="brand-info">
      <div class="name gt">MyApp</div>
      <div class="by">by Adarsha</div>
    </div>
  </div>
  <nav class="sb-body">
    <div class="nav-label">Menu</div>
    <a th:href="@{/dashboard}" class="nav-link"><span class="nav-ic">⬡</span>Dashboard</a>
    <a th:href="@{/records}" class="nav-link"><span class="nav-ic">☰</span>All Records</a>
    <a th:href="@{/records/new}" class="nav-link active"><span class="nav-ic">✦</span>New Record</a>
    <div class="nav-label">Developer</div>
    <a th:href="@{/api/records}" class="nav-link" target="_blank"><span class="nav-ic">⟨⟩</span>JSON API</a>
    <a th:href="@{/h2-console}" class="nav-link" target="_blank"><span class="nav-ic">🗄</span>DB Console</a>
  </nav>
  <div class="sb-foot">
    <div class="user-card">
      <div class="u-av" th:text="${user.fullName.substring(0,1).toUpperCase()}">U</div>
      <div style="flex:1;min-width:0;">
        <div class="u-name" th:text="${user.fullName}">User</div>
        <div class="u-role" th:text="${user.role}">USER</div>
      </div>
      <form th:action="@{/logout}" method="post" style="margin:0;">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <button type="submit" class="logout-btn">Logout</button>
      </form>
    </div>
  </div>
</aside>

<main class="main">
  <div class="breadcrumb fade-up">
    <a th:href="@{/dashboard}">Dashboard</a> › <span>New Record</span>
  </div>

  <div class="page-header fade-up">
    <h1>✦ Create New Record</h1>
    <p>Saved privately to AWS S3 — only you can see your records</p>
  </div>

  <div class="creating-as fade-up">
    👤 Creating as <strong th:text="${user.fullName}">User</strong>
    &nbsp;·&nbsp; records are private per user
  </div>

  <div th:if="${successMessage}" class="alert as fade-up">✓ <span th:text="${successMessage}"></span></div>
  <div th:if="${errorMessage}"   class="alert ae fade-up">⚠ <span th:text="${errorMessage}"></span></div>

  <div class="form-card fade-up">
    <form th:action="@{/records/create}" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

      <div class="form-grid">
        <div class="form-group full">
          <label class="lbl" for="title">Title <span class="req">*</span></label>
          <input type="text" id="title" name="title"
                 placeholder="Give your record a clear title…"
                 required maxlength="200"
                 oninput="document.getElementById('tc').textContent=this.value.length+'/200'"/>
          <div class="char-count" id="tc">0 / 200</div>
        </div>

        <div class="form-group">
          <label class="lbl" for="category">Category <span class="req">*</span></label>
          <select id="category" name="category" required>
            <option value="" disabled selected>Select a category…</option>
            <option value="General">General</option>
            <option value="Finance">Finance</option>
            <option value="Operations">Operations</option>
            <option value="Engineering">Engineering</option>
            <option value="Marketing">Marketing</option>
            <option value="HR">HR</option>
            <option value="Legal">Legal</option>
            <option value="Other">Other</option>
          </select>
        </div>

        <div class="form-group">
          <label class="lbl">Status <span class="req">*</span></label>
          <div class="status-group">
            <input type="radio" class="status-opt" id="s-active"  name="status" value="active"  checked/>
            <label class="status-lbl" for="s-active">Active</label>
            <input type="radio" class="status-opt" id="s-pending" name="status" value="pending"/>
            <label class="status-lbl" for="s-pending">Pending</label>
            <input type="radio" class="status-opt" id="s-closed"  name="status" value="closed"/>
            <label class="status-lbl" for="s-closed">Closed</label>
          </div>
        </div>

        <div class="form-group full">
          <label class="lbl" for="description">Description</label>
          <textarea id="description" name="description"
                    placeholder="Add notes, context, or any details…"
                    maxlength="2000"
                    oninput="document.getElementById('dc').textContent=this.value.length+'/2000'"></textarea>
          <div class="char-count" id="dc">0 / 2000</div>
        </div>
      </div>

      <div class="form-actions">
        <button type="submit" class="btn-submit">☁️ Save to S3</button>
        <a th:href="@{/dashboard}" class="btn-cancel">Cancel</a>
      </div>
    </form>
  </div>
</main>
</body>
</html>
